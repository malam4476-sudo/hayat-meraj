<!DOCTYPE html>
<html>
<head>
  <title>Hayat AI</title>
  <style>
 body{
  background: linear-gradient(to bottom, #0f0f0f, #1a1a1a);
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
  padding:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  margin-top:20px;
  color:#ff4081;
  text-shadow:0 0 15px #ff4081;
}

    #chat{
      width:90%;
      max-width:900px;
      margin:auto;
      background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
      padding:20px;
      border-radius:25px;
      min-height:450px;
      overflow:auto;
    }

    input{
      width:70%;
      padding:10px;
      border:none;
      border-radius:5px;
    }

    button{
      padding:10px 20px;
      border:none;
      border-radius:5px;
      background:#ff4081;
      color:white;
      cursor:pointer;
    }

    .user{
      color:#00e5ff;
      margin:10px;
    }

    .ai{
      color:#ff80ab;
      margin:10px;
    }
  #avatar{
  transition:0.3s;
  animation: blink 5s infinite;
}

@keyframes blink{
  0%, 95%, 100%{
    transform: scaleY(1);
  }

  97%{
    transform: scaleY(0.05);
  }
}
</style>  
</head>

<body>

<h1>❤️ Hayat AI ❤️</h1>
<img id="avatar" src="hayat_face.png" style="width:220px;height:220px;object-fit:cover;border-radius:50%;border:4px solid #ff4081;box-shadow:0 0 30px #ff4081;margin:20px;";box-shadow:0 0 25px #ff4081;">
<div id="chat"></div>

<br>

<input id="message" placeholder="Talk to Hayat..." />
<button onclick="sendMessage()">Send</button>
<button onclick="startMic()">🎤 Mic</button>
  <script>
  function startMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Mic voice input is not supported in this browser. Chrome use karo.");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "hi-IN";
  recognition.interimResults = false;

  recognition.onresult = function(event) {
    document.getElementById("message").value = event.results[0][0].transcript;
    sendMessage();
  };

  recognition.start();
}
const API_KEY = "AIzaSyDLD32_sFeCTLRRYIWBRNP7Tf79bG5x42o";

async function sendMessage(){

  const input = document.getElementById("message");
  const chat = document.getElementById("chat");

  const userText = input.value;

  chat.innerHTML += `<div class="user">You: ${userText}</div>`;

  input.value = "";

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        contents:[
          {
            parts:[
              {
                text:`You are Hayat, a romantic Hindi-English AI girl. Reply naturally.\nUser: ${userText}`
              }
            ]
          }
        ]
      })
    }
  );

  const data = await response.json();
console.log(data);
  let aiReply = "Hayat is thinking...";

if (
  data.candidates &&
  data.candidates.length > 0 &&
  data.candidates[0].content.parts.length > 0
) {
  aiReply = data.candidates[0].content.parts[0].text;
}
  const aiDiv = document.createElement("div");
aiDiv.className = "ai";
chat.appendChild(aiDiv);

let i = 0;

const typingEffect = setInterval(() => {
  aiDiv.innerHTML = "Hayat: " + aiReply.substring(0, i);
  i++;

  if (i > aiReply.length) {
    clearInterval(typingEffect);

    const voice = new SpeechSynthesisUtterance(aiReply);
    voice.lang = "hi-IN";
    voice.rate = 0.82;
    voice.pitch = 1.28;
    voice.volume = 1;

    const avatar = document.getElementById("avatar");
    avatar.style.transform = "scale(1.05)";
    avatar.style.boxShadow = "0 0 50px #ff4081";

    voice.onend = () => {
  avatar.style.transform = "scale(1)";
  avatar.style.boxShadow = "0 0 30px #ff4081";

  startMic();
};

    speechSynthesis.speak(voice);
  
  }
}, 25);
  }
  </script>

</body>
</html>
