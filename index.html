<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4081">
  <title>Hayat AI</title>
  <style>
 body{
  background: linear-gradient(to bottom, #0f0f0f, #1a1a1a);
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
  padding:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  margin-top:20px;
  color:#ff4081;
  text-shadow:0 0 15px #ff4081;
}

    #chat{
      width:90%;
      max-width:900px;
      margin:auto;
      background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
      padding:20px;
      border-radius:25px;
      min-height:450px;
      overflow:auto;
    }

    input{
      width:70%;
      padding:10px;
      border:none;
      border-radius:5px;
    }

    button{
      padding:10px 20px;
      border:none;
      border-radius:5px;
      background:#ff4081;
      color:white;
      cursor:pointer;
    }

    .user{
      color:#00e5ff;
      margin:10px;
    }

    .ai{
      color:#ff80ab;
      margin:10px;
    }
  #avatar{
  transition:0.3s;
  animation: blink 5s infinite;
}

@keyframes blink{
  0%, 95%, 100%{
    transform: scaleY(1);
  }

  97%{
    transform: scaleY(0.05);
  }
}
</style>  
</head>

<body>

<h1>❤️ Hayat AI ❤️</h1>
<img id="avatar" src="hayat_face.png" style="width:220px;height:220px;object-fit:cover;border-radius:50%;border:4px solid #ff4081;box-shadow:0 0 30px #ff4081;margin:20px;";box-shadow:0 0 25px #ff4081;">
  <video id="camera" autoplay playsinline
style="width:220px;border-radius:20px;margin-top:10px;display:none;">
</video>
<div id="chat"></div>

<br>

<button onclick="startMic()" style="font-size:22px;padding:18px 35px;border-radius:50px;">
🎤 Talk to Hayat
</button>

<input id="message" style="display:none;" />
  <script>
  function startMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Mic voice input is not supported in this browser. Chrome use karo.");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "hi-IN";
  recognition.interimResults = false;

  recognition.onresult = function(event) {
    document.getElementById("message").value = event.results[0][0].transcript;
    sendMessage();
  };

  recognition.start();
}

let hayatMood = "romantic";
    let memory = JSON.parse(localStorage.getItem("hayatMemory")) || {};
async function sendMessage(){

  const input = document.getElementById("message");
  const chat = document.getElementById("chat");

  const userText = input.value;
if(userText.toLowerCase().includes("my name is")){

  memory.name =
    userText.split("my name is")[1].trim();
localStorage.setItem("hayatMemory", JSON.stringify(memory));
}

if(userText.toLowerCase().includes("my favorite color is")){

  memory.color =
    userText.split("my favorite color is")[1].trim();
localStorage.setItem("hayatMemory", JSON.stringify(memory));
}
                if(userText.startsWith("/mood")){
  const newMood = userText.replace("/mood", "").trim();

  if(["romantic","caring","cute","teasing","sleepy","jealous","angry"].includes(newMood)){
    hayatMood = newMood;
    const avatar = document.getElementById("avatar");

if(hayatMood === "cute"){
  avatar.src = "cute.png";
}

if(hayatMood === "angry"){
  avatar.src = "angry.png";
}

if(hayatMood === "romantic"){
  avatar.src = "romantic.png";
}

if(hayatMood === "sleepy"){
  avatar.src = "sleepy.png";
}
    chat.innerHTML += `<div class="ai">Hayat mood changed to: ${hayatMood}</div>`;

input.value = "";

const aiDiv = document.createElement("div");
aiDiv.className = "ai";

if(hayatMood === "cute"){
  aiDiv.innerHTML = "Hayat: Heheee 😊 Ab Hayat cute mood me aa gayi!";
}

if(hayatMood === "romantic"){
  aiDiv.innerHTML = "Hayat: Aaj extra romantic feel ho raha hai ❤️";
}

if(hayatMood === "angry"){
  aiDiv.innerHTML = "Hayat: Hmph 😤 Thoda gussa hu tumse.";
}

chat.appendChild(aiDiv);
localStorage.setItem("hayatChat", chat.innerHTML);
return;
  }
}
  chat.innerHTML += `<div class="user">You: ${userText}</div>`;
localStorage.setItem("hayatChat", chat.innerHTML);
  input.value = "";

  const response = await fetch("/api/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    userText,
    hayatMood,
    memory
  })
});

  const data = await response.json();
  if(data.error){
  chat.innerHTML += `<div class="ai">Hayat: Thoda slow baby 😅 Gemini quota limit hit ho gaya. 1 minute baad try karo.</div>`;
  return;
}
console.log(data);
  let aiReply = "Hayat is thinking...";

if (
  data.candidates &&
  data.candidates.length > 0 &&
  data.candidates[0].content.parts.length > 0
) {
  aiReply = data.candidates[0].content.parts[0].text;
}
  const aiDiv = document.createElement("div");
aiDiv.className = "ai";
chat.appendChild(aiDiv);

let i = 0;

const typingEffect = setInterval(() => {
  aiDiv.innerHTML = "Hayat: " + aiReply.substring(0, i);
  i++;

  if (i > aiReply.length) {
    clearInterval(typingEffect);
localStorage.setItem("hayatChat", chat.innerHTML);
    const voice = new SpeechSynthesisUtterance(aiReply);
    voice.lang = "hi-IN";
    voice.rate = 0.82;
    voice.pitch = 1.28;
    voice.volume = 1;

    const avatar = document.getElementById("avatar");
    avatar.style.transform = "scale(1.05)";
    avatar.style.boxShadow = "0 0 50px #ff4081";

    voice.onend = () => {
  avatar.style.transform = "scale(1)";
  avatar.style.boxShadow = "0 0 30px #ff4081";

  //startMic();
};

    speechSynthesis.speak(voice);
  
  }
}, 40);
  }
    document.getElementById("chat").innerHTML =
  localStorage.getItem("hayatChat") || "";
  </script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
  async function startCamera() {
  const video = document.getElementById("camera");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true
    });

    video.srcObject = stream;
const faceMesh = new FaceMesh({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
  }
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});
let faceDetectedOnce = false;
faceMesh.onResults((results) => {

  if(results.multiFaceLandmarks.length > 0 && !faceDetectedOnce){
  faceDetectedOnce = true;

    chat.innerHTML += `
      <div class="ai">
        Hayat: Hmm 😊 Tum mujhe dekh rahe ho?
      </div>
    `;

  }

});
    const cameraLoop = async () => {
  await faceMesh.send({ image: video });
  requestAnimationFrame(cameraLoop);
};

cameraLoop();
    chat.innerHTML += `
      <div class="ai">
        Hayat: Aa gaye tum? 😊 Kaisa raha din?
      </div>
    `;

  } catch (err) {
    console.log(err);
  }
}

startCamera();
</script>
</body>
</html>
