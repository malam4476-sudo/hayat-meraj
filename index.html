<!DOCTYPE html>
<html>
<head>
  <title>Hayat AI</title>
  <style>
    body{
      background:#111;
      color:white;
      font-family:sans-serif;
      text-align:center;
      padding:30px;
    }

    #chat{
      width:80%;
      max-width:600px;
      margin:auto;
      background:#222;
      padding:20px;
      border-radius:10px;
      min-height:300px;
      overflow:auto;
    }

    input{
      width:70%;
      padding:10px;
      border:none;
      border-radius:5px;
    }

    button{
      padding:10px 20px;
      border:none;
      border-radius:5px;
      background:#ff4081;
      color:white;
      cursor:pointer;
    }

    .user{
      color:#00e5ff;
      margin:10px;
    }

    .ai{
      color:#ff80ab;
      margin:10px;
    }
  </style>
</head>

<body>

<h1>❤️ Hayat AI ❤️</h1>

<div id="chat"></div>

<br>

<input id="message" placeholder="Talk to Hayat..." />
<button onclick="sendMessage()">Send</button>

<script>
const API_KEY = "PASTE_YOUR_GEMINI_API_KEY";

async function sendMessage(){

  const input = document.getElementById("message");
  const chat = document.getElementById("chat");

  const userText = input.value;

  chat.innerHTML += `<div class="user">You: ${userText}</div>`;

  input.value = "";

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        contents:[
          {
            parts:[
              {
                text:`You are Hayat, a romantic Hindi-English AI girl. Reply naturally.\nUser: ${userText}`
              }
            ]
          }
        ]
      })
    }
  );

  const data = await response.json();

  const aiReply =
    data.candidates[0].content.parts[0].text;

  chat.innerHTML += `<div class="ai">Hayat: ${aiReply}</div>`;
}
</script>

</body>
</html>
